<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFXToolz Extension</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 380px;
            height: 500px;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: relative;
        }

        .popup-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 5px;
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(102, 126, 234, 0.4) 0%, rgba(118, 75, 162, 0.4) 100%),
                url('Popup-1.webp');
            background-size: cover;
            background-position: center;
        }

        .popup-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        .container {
            padding: 40px 24px 24px 24px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .welcome-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .title {
            color: white;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .features {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .feature {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .feature:hover {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            transform: translateY(-2px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .feature-icon svg {
            width: 20px;
            height: 20px;
            color: white;
            flex-shrink: 0;
        }

        .icon-tools {
            background: linear-gradient(135deg, #4fc3f7 0%, #29b6f6 50%, #0288d1 100%);
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.3);
        }

        .icon-security {
            background: linear-gradient(135deg, #4caf50 0%, #66bb6a 50%, #388e3c 100%);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .icon-status {
            background: linear-gradient(135deg, #e91e63 0%, #f06292 50%, #c2185b 100%);
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);
        }

        .feature-content h3 {
            color: white;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .feature-content p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            line-height: 1.3;
        }

        .get-started-btn {
            width: 100%;
            background: #2c2c2c;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .get-started-btn:hover {
            background: #1a1a1a;
        }
    </style>
</head>

                        <h3>24x7 Support</h3>
                        <p>Live chat, WhatsApp, and remote desktop support provided.</p>

                </div>

                <div class="feature" data-action="status">
                    <div class="feature-icon icon-status">

            <button class="get-started-btn" id="accessToolsBtn">Access Premium Tools</button>
